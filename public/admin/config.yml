backend:
  name: github
  repo: your-username/hamlamadong # Replace with your actual repo
  branch: main

media_folder: 'public/assets' # For small icons/local images
public_folder: '/assets'

collections:
  - name: 'blog'
    label: 'Journal'
    folder: 'src/content/blog'
    create: true
    fields:
      - { label: 'Title', name: 'title', widget: 'string' }
      - { label: 'Publish Date', name: 'date', widget: 'datetime' }
      - { label: 'Body', name: 'body', widget: 'markdown' }

  - name: 'art'
    label: 'Art Gallery'
    folder: 'src/content/art'
    create: true
    fields:
      - { label: 'Piece Name', name: 'title', widget: 'string' }
      - {
          label: 'Image URL',
          name: 'image',
          widget: 'string',
          hint: 'Paste your Cloudflare R2 URL here',
        }
      - {
          label: 'Medium',
          name: 'medium',
          widget: 'select',
          options: ['Digital', 'Oil', 'Sketch', 'Pixel Art'],
        }
      - { label: 'Description', name: 'body', widget: 'markdown' }

  - name: 'music'
    label: 'Playlist'
    folder: 'src/content/music'
    create: true
    fields:
      - { label: 'Track Title', name: 'title', widget: 'string' }
      - {
          label: 'Audio URL',
          name: 'audio',
          widget: 'string',
          hint: 'Link to your .mp3 in R2',
        }
      - { label: 'Mood', name: 'mood', widget: 'string' }
